version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: starter-saas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-starter_saas}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - starter-saas-network

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: starter-saas-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - starter-saas-network

  # API Server
  api:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: starter-saas-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-starter_saas}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      LINE_CREDENTIAL_ENCRYPTION_KEY: ${LINE_CREDENTIAL_ENCRYPTION_KEY}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
    volumes:
      - ./server/data:/app/data
      - ./server/logs:/app/logs
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - starter-saas-network

  # Client (Vue SPA)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: starter-saas-client
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${CLIENT_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - starter-saas-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  starter-saas-network:
    driver: bridge
